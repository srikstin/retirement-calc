<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Savings Calculator v1.5</title>
    <style>
        :root {
            --bg: #f2f2f7; --text: #1c1c1e; --card-bg: #ffffff; --border: #d1d1d6;
            --th-bg: #f9f9fb; --table-border: #f2f2f7; --year-col-bg: #ffffff;
            --disabled-bg: #f9f9f9; --note-color: #666; --footer-color: #8e8e93;
            --milestone-border: #c7c7cc; --audit-border: #d1d1d6;
            --input-bg: #ffffff; --input-text: #1c1c1e;
            --toggle-bg: #e5e5ea; --toggle-text: #1c1c1e;
        }
        body.dark {
            --bg: #1c1c1e; --text: #f2f2f7; --card-bg: #2c2c2e; --border: #3a3a3c;
            --th-bg: #3a3a3c; --table-border: #3a3a3c; --year-col-bg: #2c2c2e;
            --disabled-bg: #3a3a3c; --note-color: #8e8e93; --footer-color: #636366;
            --milestone-border: #48484a; --audit-border: #3a3a3c;
            --input-bg: #1c1c1e; --input-text: #f2f2f7;
            --toggle-bg: #3a3a3c; --toggle-text: #f2f2f7;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 16px; background: var(--bg); color: var(--text); }
        .page-header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; }
        h2 { margin: 0; }
        .theme-toggle { position: absolute; right: 0; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--toggle-bg); color: var(--toggle-text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s, transform 0.2s; }
        .theme-toggle:hover { transform: scale(1.1); opacity: 0.85; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 14px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 15px; gap: 5px; overflow-x: auto; }
        .tab-link { position: relative; padding: 10px 15px; cursor: pointer; font-size: 14px; font-weight: 600; color: #8e8e93; border: none; background: none; border-bottom: 2px solid transparent; transition: 0.2s; white-space: nowrap; }
        .tab-link.active { color: #007aff; border-bottom: 2px solid #007aff; }
        .indicator::after { content: ''; position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; background-color: #34c759; border-radius: 50%; border: 1px solid var(--card-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        label { font-weight: 600; font-size: 14px; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; background: var(--input-bg); color: var(--input-text); }
        .radio-group { margin: 10px 0; display: flex; gap: 20px; }
        .radio-group label { font-weight: normal; margin: 0; display: flex; align-items: center; gap: 8px; }
        .radio-group input { width: 20px; height: 20px; margin: 0; }
        .disabled { opacity: 0.3; pointer-events: none; background: var(--disabled-bg); }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid var(--table-border); }
        th { background: var(--th-bg); color: var(--text); font-weight: 600; position: sticky; top: 0; z-index: 2; }
        th.year-col { position: sticky; left: 0; z-index: 3; }
        td.year-col { position: sticky; left: 0; z-index: 1; background: var(--year-col-bg); }
        .milestone td { border-bottom: 2px solid var(--milestone-border); }
        .result-table-wrap { max-height: 65vh; overflow-y: auto; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; }
        .negative-red { color: #ff3b30; font-weight: 500; }
        .summary { font-size: 16px; font-weight: 700; margin-bottom: 15px; padding: 15px; background: #007aff; color: white; border-radius: 10px; display: flex; justify-content: space-between; }
        .audit-section { margin-top: 20px; border-top: 2px dashed var(--audit-border); padding-top: 20px; }
        .footer { text-align: center; margin-top: 30px; padding-bottom: 20px; font-size: 12px; color: var(--footer-color); }
        .footer a { color: #007aff; text-decoration: none; font-weight: 600; font-size: 14px; }
        .note-text { font-size: 12px; color: var(--note-color); margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="page-header">
        <h2>Savings Calculator</h2>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="card">
        <div class="tabs">
            <button id="link-tab1" class="tab-link active" onclick="openTab(event, 'tab1')">Investment</button>
            <button id="link-tab2" class="tab-link" onclick="openTab(event, 'tab2')">Tax & Inflation</button>
            <button id="link-tab3" class="tab-link" onclick="openTab(event, 'tab3')">Withdrawals</button>
        </div>

        <div id="tab1" class="tab-content active">
            <label>Principal ($)</label>
            <input type="number" id="principal" value="100000" inputmode="decimal">
            <label>Monthly Interest Rate (%)</label>
            <input type="number" id="monthlyRate" value="2" step="0.1" inputmode="decimal">
            <label>Years</label>
            <input type="number" id="years" value="30" inputmode="numeric">
            <label>Compounding Frequency (per year)</label>
            <input type="number" id="frequency" value="12" inputmode="numeric">
            <label>Monthly Contribution ($)</label>
            <input type="number" id="monthlyContribution" value="0" inputmode="decimal">
            <label>Stop Contributing at Year (0 = never)</label>
            <input type="number" id="stopContribYear" value="0" inputmode="numeric">
        </div>

        <div id="tab2" class="tab-content">
            <label>Tax Regime</label>
            <select id="regime">
                <option value="Personal">Personal (Stage 3 + Medicare)</option>
                <option value="SMSF">SMSF (15%)</option>
                <option value="Company">Company (25%)</option>
                <option value="NoTax" selected>No Tax</option>
            </select>
            <div id="medicareSection">
                <label>Apply 2% Medicare Levy?</label>
                <div class="radio-group">
                    <label><input type="radio" name="medicare" value="no" checked> No</label>
                    <label><input type="radio" name="medicare" value="yes"> Yes</label>
                </div>
            </div>
            <label>Annual Inflation Rate (%)</label>
            <input type="number" id="inflation" value="0" step="0.1" inputmode="decimal">
            <p class="note-text">* Adjusts ending balance AND grows withdrawal amounts annually to maintain purchasing power.</p>
        </div>

        <div id="tab3" class="tab-content">
            <label>Monthly Withdrawal ($)</label>
            <input type="number" id="withdrawal" value="0" inputmode="decimal">
            <label>Start Withdrawals (Year)</label>
            <input type="number" id="withdrawYear" value="0" inputmode="numeric">
            <div id="pensionSection">
                <label>Pension Start Year (SMSF only)</label>
                <input type="number" id="pensionYear" value="0" inputmode="numeric">
            </div>
        </div>

    </div>

    <div class="card">
        <div id="summaryBox" class="summary"></div>
        <div class="result-table-wrap"><div id="resultTable"></div></div>

        <div class="audit-section">
            <label>Audit Year (Breakdown by Period):</label>
            <input type="number" id="auditYearInput" placeholder="Enter year" style="width: 200px;" oninput="calculate()">
            <div id="auditResultTable" class="table-wrap"></div>
        </div>
    </div>

    <div class="footer">
        <a href="logic.html" target="_blank">How this calculator works</a><br><br>
        Version 1.5
    </div>

<script>
    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function personalTax(income, medicare) {
        let tax = 0;
        const rateAdd = medicare ? 0.02 : 0;
        let rem = income;
        if (rem > 190000) { tax += (rem - 190000) * (0.45 + rateAdd); rem = 190000; }
        if (rem > 135000) { tax += (rem - 135000) * (0.37 + rateAdd); rem = 135000; }
        if (rem > 45000) { tax += (rem - 45000) * (0.30 + rateAdd); rem = 45000; }
        if (rem > 18200) { tax += (rem - 18200) * (0.16 + rateAdd); }
        return tax;
    }

    function formatCurrency(val, isNegativeStyle) {
        const rounded = Math.round(val);
        const formatted = rounded.toLocaleString('en-AU');
        if (isNegativeStyle && val > 0) { return `<span class="negative-red">($${formatted})</span>`; }
        return `$${formatted}`;
    }

    function formatCompact(val) {
        const abs = Math.abs(val);
        if (abs >= 1e6) return `$${(val / 1e6).toFixed(2)}M`;
        if (abs >= 1e3) return `$${(val / 1e3).toFixed(1)}K`;
        return `$${Math.round(val).toLocaleString('en-AU')}`;
    }

    function calculate() {
        const regime = document.getElementById("regime").value;
        const withdrawalVal = parseFloat(document.getElementById("withdrawal").value) || 0;
        const inflationVal = parseFloat(document.getElementById("inflation").value) || 0;

        document.getElementById("medicareSection").className = (regime === "Personal") ? "" : "disabled";
        document.getElementById("pensionSection").className = (regime === "SMSF") ? "" : "disabled";

        const monthlyContribVal = parseFloat(document.getElementById("monthlyContribution").value) || 0;
        document.getElementById("link-tab1").classList.toggle("indicator", monthlyContribVal > 0);
        document.getElementById("link-tab2").classList.toggle("indicator", regime !== "NoTax" || inflationVal > 0);
        document.getElementById("link-tab3").classList.toggle("indicator", withdrawalVal > 0);

        let balance = parseFloat(document.getElementById("principal").value) || 0;
        const mRate = (parseFloat(document.getElementById("monthlyRate").value) || 0) / 100;
        const years = parseInt(document.getElementById("years").value) || 0;
        const freq = parseInt(document.getElementById("frequency").value) || 1;
        const withStart = parseInt(document.getElementById("withdrawYear").value) || 0;
        const penStart = parseInt(document.getElementById("pensionYear").value) || 0;
        const inflationRate = inflationVal / 100;
        const auditYear = parseInt(document.getElementById("auditYearInput").value) || 0;
        const medicare = document.querySelector('input[name="medicare"]:checked').value === 'yes';
        const monthlyContrib = parseFloat(document.getElementById("monthlyContribution").value) || 0;
        const stopContribYear = parseInt(document.getElementById("stopContribYear").value) || 0;
        const contribPerPeriod = monthlyContrib * 12 / freq;

        const pRate = mRate * (12 / freq);
        let tableBody = "", auditBody = "", totalTaxPaid = 0, rowIdx = 0;

        for (let y = 1; y <= years; y++) {
            let startBal = balance, yrInt = 0, yrWith = 0, yrContrib = 0;
            let infMult = Math.pow(1 + inflationRate, y - 1);
            let annualWithTarget = (withdrawalVal * 12) * infMult;
            let withPerPeriod = (withStart === 0 || y >= withStart) ? (annualWithTarget / freq) : 0;
            let periodContrib = (stopContribYear === 0 || y <= stopContribYear) ? contribPerPeriod : 0;

            for (let p = 1; p <= freq; p++) {
                let periodStart = balance;
                balance += periodContrib;
                yrContrib += periodContrib;
                let take = Math.min(balance, withPerPeriod);
                balance -= take;
                let earned = balance * pRate;
                balance += earned;
                yrWith += take; yrInt += earned;

                if (y === auditYear) {
                    auditBody += `<tr><td>Period ${p}</td><td>${formatCurrency(periodStart)}</td><td>${formatCurrency(periodContrib)}</td><td>${formatCurrency(take, true)}</td><td>${formatCurrency(earned)}</td><td>${formatCurrency(balance)}</td></tr>`;
                }
                if (balance <= 0) { balance = 0; break; }
            }

            let tax = 0;
            if (regime === "SMSF") {
                tax = (penStart > 0 && y >= penStart) ? 0 : yrInt * 0.15;
            } else if (regime === "Company") {
                tax = yrInt * 0.25;
            } else if (regime === "Personal") {
                tax = personalTax(yrInt, medicare);
            }
            
            balance -= tax; if (balance < 0) balance = 0;
            totalTaxPaid += tax;

            let endNominal = balance + tax;
            let inflationAdjEnd = balance / (1 + inflationRate);

            rowIdx++;
            const trClass = rowIdx % 5 === 0 ? 'milestone' : '';
            tableBody += `<tr class="${trClass}"><td class="year-col">${y}</td><td>${formatCurrency(startBal)}</td><td><b>${formatCurrency(inflationAdjEnd)}</b></td><td>${formatCurrency(yrInt)}</td><td>${yrContrib > 0 ? `<span style="color:#34c759">+${Math.round(yrContrib).toLocaleString('en-AU')}</span>` : formatCurrency(0)}</td><td>${formatCurrency(yrWith, true)}</td><td>${formatCurrency(tax)}</td><td>${formatCurrency(endNominal - tax)}</td></tr>`;
            
            balance = inflationAdjEnd;
            if (balance <= 0) break;
        }

        document.getElementById("summaryBox").innerHTML = `<span>Ending Balance (Adj): ${formatCompact(balance)}</span><span>Total Tax: ${formatCompact(totalTaxPaid)}</span>`;
        document.getElementById("resultTable").innerHTML = `<table><thead><tr><th class="year-col">Yr</th><th>Start</th><th>Inflation adj. End</th><th>Interest</th><th>Contrib</th><th>Withdr</th><th>Tax</th><th>End</th></tr></thead><tbody>${tableBody}</tbody></table>`;
        
        if (auditYear > 0) {
            document.getElementById("auditResultTable").innerHTML = `<table><thead><tr><th>Period</th><th>Start</th><th>Contrib</th><th>Withdr</th><th>Interest</th><th>End</th></tr></thead><tbody>${auditBody}</tbody></table>`;
        } else {
            document.getElementById("auditResultTable").innerHTML = "";
        }
    }

    const ICON_MOON = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const ICON_SUN = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerHTML = isDark ? ICON_SUN : ICON_MOON;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').innerHTML = ICON_SUN;
        }
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(el => { el.addEventListener('input', calculate); el.addEventListener('change', calculate); });
        calculate();
    });
</script>
</body>
</html>
